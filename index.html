<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>松鼠储财 - 法务与支持</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --text: #1f2a24;
      --muted: #607067;
      --line: #dce3dd;
      --accent: #2f7d5c;
      --panel: #ffffff;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 28px;
    }
    a.card {
      display: block;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
    }
    a.card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 18px;
    }
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>松鼠储财</h1>
    <p>本地优先的 AI 记账管家。这里提供 App Store 首发所需的隐私政策与用户协议页面。</p>

    <section class="links" aria-label="法务页面">
      <a class="card" href="./privacy.html">
        <strong>隐私政策</strong>
        了解松鼠储财如何处理本地账务数据、权限、AI 联网请求与内购权益。
      </a>
      <a class="card" href="./terms.html">
        <strong>用户协议</strong>
        了解服务内容、使用限制、数据责任、AI 辅助说明和内购规则。
      </a>
    </section>

    <footer>
      开发者：Hans孙子涵<br>
      联系：请通过 App Store 应用页面或应用内反馈入口联系开发者。
    </footer>
  </main>
</body>
</html>
